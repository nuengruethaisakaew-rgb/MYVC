<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuengruethai - Pastel Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Pacifico&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pastel: #ffdeeb;
            --secondary-pastel: #e2e2ff;
            --accent-color: #ff9aaf;
            --text-color: #5d5d5d;
        }

        body {
            background: linear-gradient(135deg, var(--primary-pastel) 0%, var(--secondary-pastel) 100%);
            color: var(--text-color);
            margin: 0;
            font-family: 'Prompt', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
            box-sizing: border-box;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .logo-text {
            color: var(--accent-color);
            font-family: 'Pacifico', cursive;
            font-size: 36px;
            margin: 0;
            text-shadow: 2px 2px white;
        }

        .social-icons {
            display: flex;
            gap: 20px;
        }

        .social-icons a {
            color: var(--text-color);
            font-size: 22px;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: var(--accent-color);
            transform: scale(1.2);
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            margin-bottom: 50px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .name-heading {
            font-family: 'Kanit', sans-serif;
            font-size: 50px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #4a4a4a;
            letter-spacing: 2px;
        }

        .job-title {
            color: var(--accent-color);
            font-size: 20px;
            font-weight: 600;
            margin-top: 0;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .location-info {
            font-size: 15px;
            margin-top: 0;
            margin-bottom: 40px;
            color: #888;
            font-weight: 300;
        }

        .profile-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 8px solid white;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255, 154, 175, 0.3);
            transition: 0.5s;
        }

        .profile-container:hover {
            transform: rotate(5deg) scale(1.05);
        }

        .profile-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .btn-contact {
            margin-top: 30px;
            padding: 12px 35px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(255, 154, 175, 0.4);
            transition: 0.3s;
        }

        .btn-contact:hover {
            background-color: #ff829d;
            transform: translateY(-3px);
        }
    </style>
</head>

<body>

<header>
    <ul class="nav-links">
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
    <h1 class="logo-text">Nuengruethai.</h1>
    <div class="social-icons">
        <a href="#"><i class="fab fa-github"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-linkedin"></i></a>
    </div>
</header>

<main>
    <div class="profile-container">
        
        <img src="imgs/me03.jpg" alt="Nuengruethai Profile">
    </div>

    <h1 class="name-heading">NUENGRUETHAI SAKAEW</h1>
    <p class="job-title">ว่างงานไม่มีงานทำจ้าเกาะแม่กินอยู่</p>
    <p class="location-info"><i class="fas fa-map-marker-alt"></i> Based in THAILAND</p>

    <a href="#contact" class="btn-contact">Say Hello!</a>
</main>

</body>
</html>
